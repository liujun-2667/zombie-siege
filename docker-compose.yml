version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: zombie-siege-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: zombie-siege-server
    ports:
      - "3001:3001"
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=3001
    depends_on:
      - redis
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: zombie-siege-client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  redis-data:
